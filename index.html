<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promemoria PS</title>
    <style>
        /* CSS SCHERMO (PC e Smartphone) */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 650px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        h1, h2 { text-align: center; color: #2c3e50; margin-top: 0; }
        p { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        .hidden { display: none !important; }
        .menu-buttons { display: flex; flex-direction: column; gap: 15px; }
        .btn { padding: 15px 20px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-add { background-color: #2ecc71; color: white; }
        .btn-search { background-color: #3498db; color: white; }
        .btn-save { background-color: #2ecc71; color: white; width: 100%; }
        .btn-back { background-color: #95a5a6; color: white; width: 100%; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: 2px solid #bdc3c7; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        .table-row-item { display: block; background: #f8f9fa; border: 1px solid #e2e8f0; padding: 15px; margin-bottom: 12px; border-radius: 8px; }
        .col-name { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px; margin-bottom: 8px; }
        .cell-name-wrapper { display: flex; align-items: center; gap: 10px; }
        .item-title { font-weight: bold; color: #2c3e50; }
        .item-description { color: #555; font-size: 14px; white-space: pre-wrap; }
        .action-buttons { display: flex; gap: 8px; }
        .btn-action { background: none; border: none; font-size: 16px; cursor: pointer; }
        .print-checkbox { width: 18px; height: 18px; cursor: pointer; }

        /* REGOLAZIONE STAMPA UNIFICATA ELEGANTE */
        @media print {
            @page { margin: 20mm 15mm !important; }
            body { background: white !important; color: #000 !important; margin: 0 !important; padding: 10px !important; font-size: 11pt !important; font-family: 'Segoe UI', Helvetica, Arial, sans-serif !important; }
            .container { box-shadow: none !important; width: 100% !important; max-width: 100% !important; padding: 0 !important; margin: 0 !important; border: none !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; background-color: #2c3e50 !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; padding: 15px 20px !important; margin-bottom: 30px !important; border-radius: 4px !important; }
            .print-only h1 { color: #ffffff !important; text-align: left !important; font-size: 18pt !important; font-weight: bold !important; margin: 0 !important; letter-spacing: 1px !important; }
            
            #items-table { display: table !important; width: 100% !important; border-collapse: collapse !important; }
            .table-row-item { display: table-row !important; background: transparent !important; page-break-inside: avoid !important; }
            .table-row-item:nth-child(even) td { background-color: #f9f9f9 !important; }
            .col-name { display: table-cell !important; width: 25% !important; padding: 14px 12px !important; border-bottom: 1.5px solid #d1d5db !important; vertical-align: top !important; background-color: #f8f9fa !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; font-weight: bold !important; text-transform: uppercase !important; }
            .col-desc { display: table-cell !important; width: 75% !important; padding: 14px 15px !important; border-bottom: 1.5px solid #d1d5db !important; vertical-align: top !important; text-align: justify !important; line-height: 1.6 !important; }
            .item-description { font-size: 10.5pt !important; color: #2d3748 !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="home-view" class="view">
        <h1>📝 PROMEMORIA PS</h1>
        <p>Gestisci i tuoi elementi e le loro descrizioni in modo semplice.</p>
        <div class="menu-buttons">
            <button onclick="openAddView()" class="btn btn-add">➕ Inserisci Nuovo Promemoria</button>
            <button onclick="switchView('search-view'); renderList();" class="btn btn-search">🔍 Cerca e Sfoglia</button>
        </div>
    </div>

    <div id="add-view" class="view hidden">
        <h2 id="form-title">➕ Aggiungi Nuovo Promemoria</h2>
        <form id="item-form" onsubmit="saveItem(event)">
            <input type="hidden" id="edit-index" value="">
            <div class="form-group">
                <label for="item-name">Nome:</label>
                <input type="text" id="item-name" required placeholder="Es. Nota XYZ, Appunto..." oninput="this.value = this.value.toUpperCase()">
            </div>
            <div class="form-group">
                <label for="item-desc">Descrizione:</label>
                <textarea id="item-desc" rows="4" required placeholder="Inserisci qui i dettagli..."></textarea>
            </div>
            <div class="button-group">
                <button type="submit" id="submit-btn" class="btn btn-save">Salva</button>
                <button type="button" onclick="switchView('home-view')" class="btn btn-back">Torna alla Home</button>
            </div>
        </form>
    </div>

    <div id="search-view" class="view hidden">
        <h2 class="no-print">🔍 Cerca e Sfoglia</h2>
        <div class="search-box no-print">
            <input type="text" id="search-input" oninput="filterItems()" placeholder="Scrivi per cercare...">
        </div>
        <div class="print-actions no-print" style="margin-bottom: 15px; display: flex; gap: 10px;">
            <button onclick="printAll()" class="btn" style="background-color: #34495e; color: white; flex: 1;">🖨️ Stampa Tutto</button>
            <button onclick="printSelected()" class="btn" style="background-color: #2980b9; color: white; flex: 1;">🖨️ Stampa Selezionati</button>
        </div>
        
        <button onclick="switchView('home-view')" class="btn btn-back no-print" style="margin-bottom: 20px;">Torna alla Home</button>
        
        <div class="print-only" style="display: none;">
            <h1>STAMPA PROMEMORIA PS</h1>
        </div>
        
        <div class="list-container">
            <table id="items-table" style="width:100%; border-collapse: collapse;">
                <tbody id="items-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzld3-X7GGBdRUWNvXIV_NWReZ6Yd-cr4bL0uoh-PyedGmaLJrCuhH-HDwKqERa1aDxCQ/exec";

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(view => view.classList.add('hidden'));
        document.getElementById(viewId).classList.remove('hidden');
    }
    function openAddView() {
        document.getElementById('item-form').reset();
        document.getElementById('edit-index').value = "";
        document.getElementById('form-title').innerText = "➕ Aggiungi Nuovo Promemoria";
        document.getElementById('submit-btn').innerText = "Salva";
        switchView('add-view');
    }
    function saveItem(event) {
        event.preventDefault();
        const name = document.getElementById('item-name').value.trim().toUpperCase();
        const desc = document.getElementById('item-desc').value.trim();
        const id = document.getElementById('edit-index').value;
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.innerText = "Salvando...";
        submitBtn.disabled = true;
        let payload = id === "" ? { action: "add", id: Date.now().toString(), name: name, desc: desc } : { action: "update", id: id, name: name, desc: desc };
        fetch(CLOUD_URL, { method: "POST", mode: "no-cors", cache: "no-cache", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) }).then(() => {
            setTimeout(() => {
                document.getElementById('item-form').reset();
                submitBtn.innerText = "Salva";
                submitBtn.disabled = false;
                switchView('home-view');
            }, 800);
        }).catch(() => { alert("Errore cloud"); submitBtn.disabled = false; });
    }
    function renderList() {
        const listElement = document.getElementById('items-list');
        listElement.innerHTML = '<tr><td colspan="2" style="text-align: center; padding: 20px;">Caricamento dal cloud...</td></tr>';
        fetch(CLOUD_URL).then(r => r.json()).then(items => {
            listElement.innerHTML = '';
            items.sort((a, b) => a.name.localeCompare(b.name, 'it', { sensitivity: 'base' }));
            if (items.length === 0) { listElement.innerHTML = '<tr><td colspan="2" style="text-align: center; padding: 20px;">Nessun promemoria.</td></tr>'; return; }
            items.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "table-row-item";
                tr.innerHTML = `
                    <td class="col-name">
                        <div class="cell-name-wrapper"><input type="checkbox" class="print-checkbox no-print" value="${item.id}"><span class="item-title">${item.name}</span></div>
                        <div class="action-buttons no-print">
                            <button onclick="editItem('${item.id}', '${escapeHtml(item.name)}', '${escapeHtml(item.desc)}')" class="btn-action">✏️</button>
                            <button onclick="deleteItem('${item.id}')" class="btn-action">🗑️</button>
                        </div>
                    </td>
                    <td class="col-desc"><div class="item-description">${item.desc.replace(/\n/g, '<br>')}</div></td>`;
                listElement.appendChild(tr);
            });
        });
    }
    function editItem(id, name, desc) {
        document.getElementById('item-name').value = name;
        document.getElementById('item-desc').value = desc;
        document.getElementById('edit-index').value = id;
        document.getElementById('form-title').innerText = "✏️ Modifica Promemoria";
        document.getElementById('submit-btn').innerText = "Aggiorna";
        switchView('add-view');
    }
    function deleteItem(id) {
        if (confirm("Cancellare dal cloud?")) {
            fetch(CLOUD_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "delete", id: id }) }).then(() => { setTimeout(() => { renderList(); }, 500); });
        }
    }
    function filterItems() {
        const text = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.table-row-item').forEach(row => {
            const title = row.querySelector('.item-title').innerText.toLowerCase();
            row.style.display = title.includes(text) ? "" : "none";
        });
    }
    
    function printAll() { window.print(); }
    
    // FUNZIONE DI STAMPA DISTRUTTIVA/RICOSTRUTTIVA (A PROVA DI TELEFONO)
    function printSelected() {
        const listElement = document.getElementById('items-list');
        const checkedBoxes = document.querySelectorAll('.print-checkbox:checked');
        
        if (checkedBoxes.length === 0) { 
            alert("Per favore, seleziona almeno un promemoria spuntando la casella prima di stampare."); 
            return; 
        }
        
        // 1. Salviamo in memoria tutte le righe attualmente presenti nello schermo
        const originalHtml = listElement.innerHTML;
        
        // 2. Costruiamo una stringa HTML inserendo SOLO le righe selezionate
        let selectedHtml = "";
        checkedBoxes.forEach(cb => {
            const originalRow = cb.closest('.table-row-item');
            selectedHtml += `<tr class="table-row-item">${originalRow.innerHTML}</tr>`;
        });
        
        // 3. Sostituiamo la tabella sullo schermo lasciando SOLO i selezionati
        listElement.innerHTML = selectedHtml;
        
        // Un piccolissimo ritardo per far digerire la cosa al cellulare, poi parte la stampa
        setTimeout(() => {
            window.print();
            
            // 4. Appena si chiude la schermata di stampa, rimettiamo a posto la lista completa
            setTimeout(() => {
                listElement.innerHTML = originalHtml;
                filterItems(); // Mantieni eventuali filtri di ricerca attivi
            }, 500);
        }, 150);
    }

    function escapeHtml(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
</script>
</body>
</html>
